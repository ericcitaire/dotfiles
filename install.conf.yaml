- defaults:
    link:
      relink: true
- clean:
  - '~'
  - '~/.oh-my-zsh-custom'
- create:
    - ~/.oh-my-zsh-custom/plugins
    - ~/.oh-my-zsh-custom/themes
- link:
    ~/.zshrc:
      path: zsh/zshrc
      force: true
    ~/.oh-my-zsh: zsh/ohmyzsh
    ~/.oh-my-zsh-custom/themes/powerlevel10k: zsh/custom/themes/powerlevel10k
    ~/.oh-my-zsh-custom/p10k.zsh: zsh/custom/p10k.zsh
    ~/.oh-my-zsh-custom/editor.zsh: zsh/custom/editor.zsh
    ~/.oh-my-zsh-custom/path.zsh: zsh/custom/path.zsh
    ~/.oh-my-zsh-custom/nvm.zsh: zsh/custom/nvm.zsh
    ~/.oh-my-zsh/completions: zsh/completions
    ~/.config/nvim: nvim
    ~/.tmux.conf: tmux.conf
- shell:
  - command: git submodule update --init --recursive --depth 1
    description: Installing submodules
  - command: $HOME/.oh-my-zsh-custom/themes/powerlevel10k/gitstatus/install
    description: Installing gitstatus
  - command: curl -sS https://webi.sh/webi | sh
    description: Installing Webi
  - command: webi delta fzf jq k9s kubectx kubens rg shfmt terraform yq
    description: Installing tools
    stdout: true
    stderr: true
